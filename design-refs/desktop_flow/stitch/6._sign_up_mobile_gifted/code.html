<!DOCTYPE html>

<style>
        body { font-family: 'Inter', sans-serif; }
        .font-archivo { font-family: 'Archivo', sans-serif; font-weight: 900; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center p-6 selection:bg-secondary-fixed selection:text-on-secondary-fixed">
<div class="w-full max-w-sm space-y-12">
<!-- Logo/Icon Anchor -->
<div class="flex justify-center">
<div class="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="account_balance">account_balance</span>
</div>
</div>
<!-- Headline & Supporting Text -->
<div class="text-center space-y-3">
<h1 class="font-archivo text-4xl tracking-[-0.02em] text-primary uppercase leading-none">CREATE ACCOUNT</h1>
<p class="text-on-surface-variant font-medium text-sm">Join the digital ledger for premium utility.</p>
</div>
<!-- Form Section -->
<div class="space-y-6">
<div class="space-y-4">
<!-- Input Field -->
<div class="group">
<label class="block text-[11px] font-bold text-on-surface-variant uppercase tracking-widest mb-2 px-1" for="email">Email Address</label>
<div class="relative">
<input class="w-full h-14 px-4 bg-surface-container-low border border-outline-variant/20 rounded-xl font-medium text-on-surface placeholder:text-outline focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all duration-200" id="email" name="email" placeholder="name@company.com" type="email"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2">
<span class="material-symbols-outlined text-outline text-xl" data-icon="mail">mail</span>
</div>
</div>
</div>
<!-- Primary CTA -->
<button class="w-full h-14 bg-secondary text-on-secondary font-bold text-base rounded-xl hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group">
                    Continue with Email
                    <span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Social/Alternative Section (Architectural Grid) -->
<div class="relative py-4 flex items-center gap-4">
<div class="flex-1 h-[1px] bg-surface-container-high"></div>
<span class="text-[10px] font-bold text-outline uppercase tracking-tighter">Secure Protocol</span>
<div class="flex-1 h-[1px] bg-surface-container-high"></div>
</div>
<!-- Secondary Action -->
<div class="text-center">
<p class="text-on-surface-variant text-sm font-medium">
                    Already have an account? 
                    <a class="text-secondary font-bold hover:underline underline-offset-4 decoration-2" href="#">Sign In</a>
</p>
</div>
</div>
<!-- Aesthetic Branding Element (Visual Ledger Motif) -->
<div class="pt-12 flex flex-col items-center gap-4 opacity-40">
<div class="grid grid-cols-4 gap-2 w-full max-w-[200px]">
<div class="h-1 bg-outline-variant/30 rounded-full"></div>
<div class="h-1 bg-outline-variant/30 rounded-full"></div>
<div class="h-1 bg-secondary/40 rounded-full"></div>
<div class="h-1 bg-outline-variant/30 rounded-full"></div>
</div>
<p class="text-[10px] font-black text-primary tracking-[0.2em] uppercase">Gifted Ledger System v4.0</p>
</div>
</div>
<!-- Background Decorative Texture (Subtle Mural) -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute top-0 right-0 w-[500px] h-[500px] bg-secondary/5 blur-[120px] rounded-full -translate-y-1/2 translate-x-1/2"></div>
<div class="absolute bottom-0 left-0 w-[400px] h-[400px] bg-primary-container/5 blur-[100px] rounded-full translate-y-1/3 -translate-x-1/4"></div>
</div>
