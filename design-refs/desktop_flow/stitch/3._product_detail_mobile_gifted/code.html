<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GIFTED - Amazon.com Gift Card</title>

              "primary": "#000000",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .archivo-black { font-family: 'Archivo', sans-serif; font-weight: 900; }
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface">
<!-- TopAppBar -->
<header class="bg-white dark:bg-slate-900 sticky top-0 z-50 docked full-width">
<div class="flex justify-between items-center w-full px-6 py-4 max-w-screen-xl mx-auto">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-50" data-icon="menu">menu</span>
<span class="text-2xl font-black tracking-tighter text-slate-900 dark:text-slate-50 archivo-black">GIFTED</span>
</div>
<div class="text-slate-900 dark:text-slate-50 text-sm font-medium">US · English</div>
</div>
<div class="bg-slate-100 dark:bg-slate-800 h-[1px] w-full"></div>
</header>
<main class="pb-40">
<!-- Hero / Product Display -->
<section class="px-6 pt-8 pb-12 bg-white">
<div class="flex flex-col items-center">
<div class="w-full aspect-[1.58/1] rounded-xl bg-surface-container-low flex items-center justify-center overflow-hidden relative group">
<img alt="Amazon Logo" class="w-32 h-auto opacity-90 group-hover:scale-105 transition-transform duration-500" data-alt="Modern high-contrast photograph of a sleek matte black gift card with a gold embossed Amazon smile logo on a white marble background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD-ydwkALpz6wYhkzJz2MdWXFF_BLKhgboj0JFanC2pf65Jbxqb3J1JuOAogFLmII7noVmEb6T8LP4DW7rw_0ZsjieQ4zqaZaudrELIsGLnCPk97ZTs9QBw1xemzyY4KoG2jfiXrdFjZue9lQa46u6OhT11ZkqjArWu4qLRxl9qboRTMuCfpcaU1bZzq-4KkEKE5gSycH-xqIwKDsUZg65DIkb8Y5RsMFjQGKwrJj-6M9POtcAuOgwJqONX8tDCDo6iZcpDON08j_c"/>
</div>
<div class="mt-8 text-center">
<h1 class="archivo-black text-3xl tracking-tight text-primary uppercase">AMAZON.COM GIFT CARD</h1>
<p class="text-on-surface-variant mt-2 font-medium">Instantly redeemable for millions of items.</p>
</div>
</div>
</section>
<!-- Amount Selection -->
<section class="px-6 py-10 bg-surface">
<label class="block text-xs font-black tracking-widest text-on-surface-variant uppercase mb-6">SELECT AMOUNT</label>
<div class="grid grid-cols-2 gap-4">
<button class="bg-white py-6 rounded-xl border-2 border-secondary flex flex-col items-center justify-center transition-all active:scale-95">
<span class="text-2xl font-black archivo-black text-secondary">$25</span>
<span class="text-[10px] font-bold text-secondary-container uppercase tracking-tighter mt-1">POPULAR</span>
</button>
<button class="bg-white py-6 rounded-xl border-2 border-transparent hover:border-outline-variant/30 flex items-center justify-center transition-all active:scale-95">
<span class="text-2xl font-black archivo-black text-on-surface-variant opacity-60">$50</span>
</button>
<button class="bg-white py-6 rounded-xl border-2 border-transparent hover:border-outline-variant/30 flex items-center justify-center transition-all active:scale-95">
<span class="text-2xl font-black archivo-black text-on-surface-variant opacity-60">$100</span>
</button>
<button class="bg-white py-6 rounded-xl border-2 border-transparent hover:border-outline-variant/30 flex items-center justify-center transition-all active:scale-95">
<span class="text-2xl font-black archivo-black text-on-surface-variant opacity-60">$250</span>
</button>
</div>
<div class="mt-6">
<div class="relative">
<input class="w-full bg-white border-none py-4 px-5 rounded-xl text-lg font-bold placeholder:text-outline-variant focus:ring-2 focus:ring-secondary/20" placeholder="Custom Amount" type="text"/>
<span class="absolute right-5 top-1/2 -translate-y-1/2 text-sm font-black text-on-surface-variant/40 archivo-black">USD</span>
</div>
</div>
</section>
<!-- Delivery Details -->
<section class="px-6 py-10 bg-white">
<div class="flex items-center justify-between mb-8">
<label class="text-xs font-black tracking-widest text-on-surface-variant uppercase">DELIVERY FOR</label>
<div class="flex bg-surface-container rounded-full p-1">
<button class="px-5 py-1.5 rounded-full text-xs font-bold transition-all bg-white shadow-sm text-primary">FOR ME</button>
<button class="px-5 py-1.5 rounded-full text-xs font-bold transition-all text-on-surface-variant/60">SEND AS GIFT</button>
</div>
</div>
<div class="space-y-6">
<div>
<label class="block text-[11px] font-bold text-on-surface-variant uppercase mb-2 ml-1">RECIPIENT EMAIL</label>
<input class="w-full bg-surface-container-low border-none py-4 px-5 rounded-xl font-medium focus:ring-2 focus:ring-secondary/20" type="email" value="alex.walker@gmail.com"/>
</div>
<div>
<label class="block text-[11px] font-bold text-on-surface-variant uppercase mb-2 ml-1">PERSONAL MESSAGE (OPTIONAL)</label>
<textarea class="w-full bg-surface-container-low border-none py-4 px-5 rounded-xl font-medium focus:ring-2 focus:ring-secondary/20 resize-none" placeholder="Add a note..." rows="3"></textarea>
</div>
</div>
</section>
<!-- Payment Notice -->
<section class="px-6 py-8 flex items-start gap-3 bg-surface-container-low mx-6 rounded-xl">
<span class="material-symbols-outlined text-secondary" data-icon="info">info</span>
<p class="text-xs font-medium leading-relaxed text-on-surface-variant">Your gift card will be delivered instantly via email. Non-refundable once claimed.</p>
</section>
</main>
<!-- Sticky Bottom Bar -->
<footer class="fixed bottom-0 left-0 w-full bg-white/95 backdrop-blur-md z-50 shadow-[0_-4px_20px_rgba(15,23,42,0.06)] px-6 pt-4 pb-8 border-t border-outline-variant/10">
<div class="max-w-screen-xl mx-auto">
<div class="flex items-end justify-between mb-4">
<span class="text-[10px] font-black tracking-widest text-on-surface-variant uppercase">TOTAL AMOUNT DUE</span>
<span class="text-xl font-black archivo-black text-primary">$25.00 <span class="text-xs font-medium tracking-normal text-on-surface-variant/60 ml-1">USD</span></span>
</div>
<button class="w-full bg-secondary text-white py-5 rounded-xl font-bold text-sm tracking-wide active:scale-[0.98] transition-all shadow-lg shadow-secondary/20">
                CONTINUE AS GUEST
            </button>
<div class="mt-4 text-center">
<button class="text-xs font-bold text-on-surface-variant/60 hover:text-secondary transition-colors underline decoration-outline-variant/30 underline-offset-4">
                    ALREADY HAVE AN ACCOUNT? SIGN IN
                </button>
</div>
</div>
</footer>
<!-- BottomNavBar (Hidden on focus screens as per instructions, but kept as reference for structure) -->
<!-- Suppressed to prioritize checkout/detail focus -->
</body></html>
