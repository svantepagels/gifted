<!DOCTYPE html>
<html>
<head>
<style>* { margin: 0; padding: 0; } body { overflow: hidden; }</style>
</head>
<body>
<canvas id="c" width="2400" height="1600"></canvas>
<script>
const W = 2400, H = 1600;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Dark background with subtle radial gradient
const bgGrad = ctx.createRadialGradient(W/2, H*0.7, 100, W/2, H/2, W*0.7);
bgGrad.addColorStop(0, '#1a1a1a');
bgGrad.addColorStop(0.6, '#0a0a0a');
bgGrad.addColorStop(1, '#020202');
ctx.fillStyle = bgGrad;
ctx.fillRect(0, 0, W, H);

// Card dimensions - 87% width, credit card ratio
const cardW = W * 0.87;
const cardH = cardW / 1.586;
const cardX = (W - cardW) / 2;
const cardY = (H - cardH) / 2;
const radius = 32;

// Helper: draw rounded rect
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// Apply 3D perspective via transform
ctx.save();
// Simulate 3D tilt with a skew/scale transform
const cx = W / 2, cy = H / 2;
ctx.translate(cx, cy);
// Subtle 3D effect: slight horizontal skew + scale adjustment
ctx.transform(1, 0.02, -0.04, 1, 0, 0);
ctx.translate(-cx, -cy);

// Card shadow (multiple layers for depth)
ctx.save();
ctx.shadowColor = 'rgba(0,0,0,0.7)';
ctx.shadowBlur = 120;
ctx.shadowOffsetX = 15;
ctx.shadowOffsetY = 50;
roundRect(cardX, cardY, cardW, cardH, radius);
ctx.fillStyle = '#fff';
ctx.fill();
ctx.restore();

// Card base
roundRect(cardX, cardY, cardW, cardH, radius);
const cardGrad = ctx.createLinearGradient(cardX, cardY, cardX + cardW, cardY + cardH);
cardGrad.addColorStop(0, '#ffffff');
cardGrad.addColorStop(0.3, '#f8f8f8');
cardGrad.addColorStop(0.7, '#f0f0f0');
cardGrad.addColorStop(1, '#e8e8e8');
ctx.fillStyle = cardGrad;
ctx.fill();

// Glossy highlight on upper-left
ctx.save();
roundRect(cardX, cardY, cardW, cardH, radius);
ctx.clip();
const gloss = ctx.createRadialGradient(cardX + cardW * 0.25, cardY + cardH * 0.2, 50, cardX + cardW * 0.3, cardY + cardH * 0.3, cardW * 0.5);
gloss.addColorStop(0, 'rgba(255,255,255,0.45)');
gloss.addColorStop(0.5, 'rgba(255,255,255,0.1)');
gloss.addColorStop(1, 'rgba(255,255,255,0)');
ctx.fillStyle = gloss;
ctx.fillRect(cardX, cardY, cardW, cardH);
ctx.restore();

// "Uber" logo - centered on card
const fontSize = Math.round(cardH * 0.22); // exactly 22% of card height
ctx.font = `700 ${fontSize}px -apple-system, "Helvetica Neue", Arial, sans-serif`;
ctx.fillStyle = '#000000';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('Uber', cardX + cardW / 2, cardY + cardH / 2);

ctx.restore(); // restore 3D transform

// Subtle reflection below card
ctx.save();
const refY = cardY + cardH + 30;
const refGrad = ctx.createLinearGradient(0, refY, 0, refY + 60);
refGrad.addColorStop(0, 'rgba(255,255,255,0.03)');
refGrad.addColorStop(1, 'rgba(255,255,255,0)');
ctx.fillStyle = refGrad;
ctx.fillRect(cardX + 50, refY, cardW - 100, 60);
ctx.restore();
</script>
</body>
</html>
