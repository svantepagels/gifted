<!DOCTYPE html>
<html><head><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 2400px; height: 1600px; overflow: hidden; }

.scene {
  width: 2400px; height: 1600px;
  position: relative;
  background: radial-gradient(ellipse 80% 75% at 48% 42%, #1a1c2a 0%, #0f1018 50%, #060608 100%);
  display: flex; align-items: center; justify-content: center;
  perspective: 1000px;
}

.light1 {
  position: absolute; top: -8%; right: 5%;
  width: 1000px; height: 800px;
  background: radial-gradient(ellipse, rgba(255,245,230,0.06) 0%, transparent 65%);
}
.light2 {
  position: absolute; bottom: 0; left: 3%;
  width: 700px; height: 600px;
  background: radial-gradient(ellipse, rgba(160,180,240,0.035) 0%, transparent 65%);
}
.light-apple {
  position: absolute; top: 30%; left: 33%;
  width: 850px; height: 600px;
  background: radial-gradient(ellipse, rgba(180,200,255,0.03) 0%, transparent 55%);
}

.vignette {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 72% 68% at 50% 48%, transparent 35%, rgba(0,0,0,0.65) 100%);
  z-index: 10; pointer-events: none;
}

.card-wrapper {
  transform: rotateY(-22deg) rotateX(7deg) rotateZ(-2deg);
  transform-style: preserve-3d;
  position: relative;
}

.card-shadow {
  position: absolute;
  width: 1200px; height: 758px;
  top: 55px; left: 35px;
  background: rgba(0,0,0,0.7);
  border-radius: 28px;
  filter: blur(75px);
  transform: skewX(-4deg);
  z-index: -2;
}

.card {
  width: 1200px; height: 758px;
  border-radius: 28px;
  position: relative; overflow: hidden;
  background: linear-gradient(155deg, #ffffff 0%, #f8f8fa 25%, #f0f0f5 50%, #e8eaf0 75%, #e0e2ea 100%);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.3),
    inset 0 1px 0 rgba(255,255,255,0.9),
    inset 0 -1px 0 rgba(0,0,0,0.05),
    0 30px 90px rgba(0,0,0,0.55),
    0 10px 35px rgba(0,0,0,0.35);
}

/* Iridescent gradient overlay */
.card-iridescent {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, 
    rgba(255,100,100,0.06) 0%, 
    rgba(255,180,60,0.05) 15%,
    rgba(255,230,80,0.04) 25%,
    rgba(100,220,120,0.05) 40%,
    rgba(80,180,255,0.06) 55%,
    rgba(140,100,255,0.05) 70%,
    rgba(220,80,200,0.05) 85%,
    rgba(255,100,120,0.04) 100%);
  pointer-events: none;
}

/* Subtle rainbow band across card */
.card-rainbow {
  position: absolute; inset: 0;
  background: linear-gradient(110deg,
    transparent 20%,
    rgba(255,59,48,0.04) 30%,
    rgba(255,149,0,0.04) 35%,
    rgba(255,204,0,0.04) 40%,
    rgba(52,199,89,0.04) 45%,
    rgba(0,122,255,0.05) 50%,
    rgba(88,86,214,0.04) 55%,
    rgba(175,82,222,0.04) 60%,
    transparent 70%);
  pointer-events: none;
}

.card-shine {
  position: absolute; inset: 0;
  background: linear-gradient(128deg, 
    transparent 28%, rgba(255,255,255,0.15) 40%, 
    rgba(255,255,255,0.25) 44%, rgba(255,255,255,0.15) 48%, 
    transparent 58%);
  pointer-events: none;
}

.logo-area {
  position: absolute;
  top: 42%; left: 50%;
  transform: translate(-50%, -50%);
  display: flex; flex-direction: column; align-items: center; gap: 24px;
}

.apple-logo {
  width: 400px; height: 480px;
  position: relative;
  filter: drop-shadow(0 4px 20px rgba(0,0,0,0.08));
}

.apple-logo svg { width: 100%; height: 100%; }

.apple-text {
  font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 48px; font-weight: 300;
  letter-spacing: 2px;
  color: rgba(0,0,0,0.7);
}

.logo-glow {
  position: absolute;
  top: 33%; left: 50%; transform: translate(-50%, -50%);
  width: 500px; height: 400px;
  background: radial-gradient(ellipse, rgba(120,140,180,0.06) 0%, transparent 60%);
  pointer-events: none;
}

.card-bottom {
  position: absolute;
  bottom: 42px; left: 60px; right: 60px;
  display: flex; justify-content: space-between; align-items: flex-end;
}

.gift-label {
  font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 17px; font-weight: 400;
  letter-spacing: 5px;
  color: rgba(0,0,0,0.2);
  text-transform: uppercase;
}

.dots-group { display: flex; gap: 14px; }
.dot-set { display: flex; gap: 5px; }
.dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: rgba(0,0,0,0.1);
}
</style></head>
