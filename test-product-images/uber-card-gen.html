<!DOCTYPE html>
<html>
<head>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 2400px; height: 1600px; background: radial-gradient(ellipse at 50% 80%, #1a1a1a 0%, #080808 60%, #000 100%); overflow: hidden; display: flex; align-items: center; justify-content: center; }
.scene { width: 2400px; height: 1600px; perspective: 2000px; display: flex; align-items: center; justify-content: center; position: relative; }
.card-wrapper {
  width: 87%;
  display: flex;
  align-items: center;
  justify-content: center;
  transform: rotateY(-8deg) rotateX(4deg);
  transform-style: preserve-3d;
}
.card {
  width: 100%;
  aspect-ratio: 1.586;
  border-radius: 32px;
  background: linear-gradient(160deg, #ffffff 0%, #f5f5f5 30%, #ececec 60%, #e0e0e0 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  box-shadow: 
    0 80px 160px rgba(0,0,0,0.85),
    0 30px 80px rgba(0,0,0,0.6),
    -15px 30px 60px rgba(0,0,0,0.3);
}
/* Glossy highlight */
.card::before {
  content: '';
  position: absolute;
  top: -30%;
  left: -20%;
  width: 80%;
  height: 80%;
  background: radial-gradient(ellipse at 40% 40%, rgba(255,255,255,0.5) 0%, transparent 60%);
  pointer-events: none;
}
/* Subtle vignette */
.card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(0,0,0,0.04) 100%);
  pointer-events: none;
}
.uber-logo {
  font-family: 'Inter', -apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
  font-size: 360px;
  font-weight: 700;
  color: #000000;
  letter-spacing: -3px;
  z-index: 1;
  text-align: center;
  line-height: 1;
  /* Use transform to fine-tune centering accounting for font metrics */
  transform: translateY(-8px);
}
/* Surface reflection on dark background */
.reflection {
  position: absolute;
  bottom: 60px;
  left: 50%;
  transform: translateX(-52%) scaleY(0.15) rotateY(-8deg);
  width: 80%;
  height: 400px;
  background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 80%);
  filter: blur(30px);
  border-radius: 32px;
  pointer-events: none;
}
</style>
</head>
<body>
  <div class="scene">
    <div class="card-wrapper">
      <div class="card">
        <div class="uber-logo">Uber</div>
      </div>
    </div>
    <div class="reflection"></div>
  </div>
</body>
</html>
