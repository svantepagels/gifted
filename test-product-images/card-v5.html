<!DOCTYPE html>
<html><head><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 2400px; height: 1600px; overflow: hidden; }

.scene {
  width: 2400px; height: 1600px;
  position: relative;
  background: radial-gradient(ellipse 80% 75% at 48% 42%, #201c2a 0%, #12101a 50%, #080810 100%);
  display: flex; align-items: center; justify-content: center;
  perspective: 1000px;
}

.light1 {
  position: absolute; top: -8%; right: 5%;
  width: 1000px; height: 800px;
  background: radial-gradient(ellipse, rgba(255,235,210,0.07) 0%, transparent 65%);
}
.light2 {
  position: absolute; bottom: 0; left: 3%;
  width: 700px; height: 600px;
  background: radial-gradient(ellipse, rgba(160,170,230,0.04) 0%, transparent 65%);
}
.light-red {
  position: absolute; top: 32%; left: 35%;
  width: 800px; height: 550px;
  background: radial-gradient(ellipse, rgba(229,9,20,0.045) 0%, transparent 55%);
}

.vignette {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 72% 68% at 50% 48%, transparent 35%, rgba(0,0,0,0.65) 100%);
  z-index: 10; pointer-events: none;
}

.card-wrapper {
  transform: rotateY(-22deg) rotateX(7deg) rotateZ(-2deg);
  transform-style: preserve-3d;
  position: relative;
}

.card-shadow {
  position: absolute;
  width: 1200px; height: 758px;
  top: 55px; left: 35px;
  background: rgba(0,0,0,0.7);
  border-radius: 28px;
  filter: blur(75px);
  transform: skewX(-4deg);
  z-index: -2;
}

.card {
  width: 1200px; height: 758px;
  border-radius: 28px;
  position: relative; overflow: hidden;
  background: linear-gradient(145deg, #383342 0%, #2a2636 40%, #222030 100%);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.1),
    inset 0 1px 0 rgba(255,255,255,0.08),
    inset 0 -1px 0 rgba(0,0,0,0.3),
    0 30px 90px rgba(0,0,0,0.55),
    0 10px 35px rgba(0,0,0,0.35);
}

.card-shine {
  position: absolute; inset: 0;
  background: linear-gradient(128deg, 
    transparent 28%, rgba(255,255,255,0.03) 40%, 
    rgba(255,255,255,0.065) 44%, rgba(255,255,255,0.03) 48%, 
    transparent 58%);
  pointer-events: none;
}

.logo-area {
  position: absolute;
  top: 44%; left: 50%;
  transform: translate(-50%, -50%);
  display: flex; flex-direction: column; align-items: center; gap: 28px;
}

.netflix-n {
  width: 140px; height: 190px;
  position: relative;
  filter: drop-shadow(0 6px 40px rgba(229,9,20,0.45));
}

.netflix-n svg { width: 100%; height: 100%; }

.netflix-text {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 82px; font-weight: 700;
  letter-spacing: 18px;
  color: #e50914;
  text-shadow: 0 3px 25px rgba(229,9,20,0.5), 0 0 80px rgba(229,9,20,0.12);
  text-indent: 18px;
}

.logo-glow {
  position: absolute;
  top: 35%; left: 50%; transform: translate(-50%, -50%);
  width: 550px; height: 450px;
  background: radial-gradient(ellipse, rgba(229,9,20,0.06) 0%, transparent 60%);
  pointer-events: none;
}

.card-bottom {
  position: absolute;
  bottom: 42px; left: 60px; right: 60px;
  display: flex; justify-content: space-between; align-items: flex-end;
}

.gift-label {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 17px; font-weight: 400;
  letter-spacing: 5px;
  color: rgba(255,255,255,0.22);
  text-transform: uppercase;
}

.dots-group { display: flex; gap: 14px; }
.dot-set { display: flex; gap: 5px; }
.dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: rgba(255,255,255,0.13);
}
</style></head>
<body>
<div class="scene">
  <div class="light1"></div>
  <div class="light2"></div>
  <div class="light-red"></div>
  <div class="vignette"></div>
  
  <div class="card-wrapper">
    <div class="card-shadow"></div>
    <div style="position:absolute; bottom:-60px; left:-200px; right:-200px; height:1px; background:linear-gradient(90deg, transparent, rgba(255,255,255,0.04) 30%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0.04) 70%, transparent); z-index:-1;"></div>
    <div class="card">
      <div class="card-shine"></div>
      <div class="logo-glow"></div>
      <div class="logo-area">
        <div class="netflix-n">
          <svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="leftBar" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#e50914"/>
                <stop offset="60%" stop-color="#b20710"/>
              </linearGradient>
              <linearGradient id="diagBar" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#e50914"/>
                <stop offset="50%" stop-color="#ff1a27"/>
                <stop offset="100%" stop-color="#e50914"/>
              </linearGradient>
              <linearGradient id="rightBar" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#e50914"/>
                <stop offset="100%" stop-color="#b20710"/>
              </linearGradient>
            </defs>
            <rect x="0" y="0" width="26" height="140" fill="url(#leftBar)"/>
            <polygon points="0,0 26,0 100,140 74,140" fill="url(#diagBar)"/>
            <rect x="74" y="0" width="26" height="140" fill="url(#rightBar)"/>
            <polygon points="0,45 26,80 26,140 0,140" fill="rgba(0,0,0,0.2)"/>
          </svg>
        </div>
        <div class="netflix-text">NETFLIX</div>
      </div>
      <div class="card-bottom">
        <div class="gift-label">Gift Card</div>
        <div class="dots-group">
          <div class="dot-set"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
          <div class="dot-set"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
          <div class="dot-set"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
          <div class="dot-set"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        </div>
      </div>
    </div>
  </div>
</div>
</body></html>
